[server]
host = "127.0.0.1"
port = 22217

# Allowed CORS origin list (default ["http://localhost:22217"])
# cors_origins = ["http://localhost:22217"]

# API keys and admin password are configured via the web admin panel (http://127.0.0.1:22217/admin)
# [[api_keys]]
# key = "sk-test"
# description = "development test"

[ds_core]
# Account pool ([[ds_core.accounts]])
# Email login example
# [[ds_core.accounts]]
# email = "user1@example.com"
# mobile = ""
# area_code = ""
# password = "pass1"

# Chinese mobile login example
# [[ds_core.accounts]]
# email = ""
# mobile = "13800138000"
# area_code = "+86"
# password = "pass2"

# Verified User-Agent (Android client emulation)
# user_agent = "DeepSeek/2.1.1 Android/35"

# API base URL (default)
# api_base = "https://chat.deepseek.com/api/v0"

# Full WASM file URL (required for PoW computation; the version hash changes — manual update recommended)
# wasm_url = "https://fe-static.deepseek.com/chat/static/sha3_wasm_bg.7b9ca65ddd.wasm"

# X-Client-Version request header (used for expert model and other features)
# client_version = "2.0.0"

# X-Client-Platform request header
# client_platform = "android"

# X-Client-Locale request header
# client_locale = "zh_CN"

# Proxy config (optional; bypasses CloudFront WAF regional restrictions)
# Using a non-US exit node avoids WAF Challenge
# [proxy]
# url = "http://127.0.0.1:7890"
# url = "socks5://127.0.0.1:7891"

# Supported model type list, default ["default", "expert", "vision"]
# model_types = ["default", "expert", "vision"]
# max_input_tokens = [1048576, 1048576, 1048576]
# max_output_tokens = [384000, 384000, 384000]
# input_character_limits = [2621440, 163840, 2621440]

# Model aliases (optional; aligned by index with model_types, empty by default)
# model_aliases = []

# Tool call tag config
# Built-in fuzzy matching: full-width `｜` (U+FF5C) and `▁` (U+2581) are treated as ASCII `|` and `_` respectively,
# automatically covering most character-level hallucination variants.
# extra is for fallback tags with completely different formats (e.g. <tool_call>):
# tool_call.extra_starts = ["<|tool_call_begin|>", "<tool_calls>", "<tool_call>"]
# tool_call.extra_ends = ["<|tool_call_end|>", "</tool_calls>", "</tool_call>"]

# Admin config (managed automatically by the admin panel; no manual setup needed at deploy time)
# [admin]
# password_hash = ""
# jwt_secret = ""
# jwt_issued_at = 0
