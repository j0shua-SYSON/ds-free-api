name: Build Windows (dev)

on:
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/.bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web
      - name: Build frontend
        run: bun run build
        working-directory: web
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error

  build-windows:
    needs: [build-frontend]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc
          cache-key: x86_64-pc-windows-msvc-dev
      - name: Install dependencies
        shell: cmd
        run: |
          choco install cmake -y
          choco install strawberryperl -y
          choco install pkgconfiglite -y
          choco install llvm -y
          choco install nasm -y
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          $name = "ds-free-api-dev-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $name
          Copy-Item "target/x86_64-pc-windows-msvc/release/ds-free-api.exe" "$name/"
          Copy-Item LICENSE, README.md, config.example.toml "$name/"
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ds-free-api-dev-windows-x86_64
          path: "*.zip"
          if-no-files-found: error
